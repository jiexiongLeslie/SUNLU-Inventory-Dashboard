<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNLU 链接访问量统计</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #16325c;
  --accent: #2f80ed;
  --bg: #f4f7fb;
  --card: #fff;
  --text: #172033;
  --muted: #6b7280;
  --border: #dfe7f1;
  --ok: #218a54;
  --warn: #b7791f;
  --bad: #c53030;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; background: var(--bg); color: var(--text); }
.container { max-width: 1500px; margin: 0 auto; padding: 24px; }
.header { background: var(--primary); color: #fff; padding: 24px 28px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; gap: 18px; margin-bottom: 18px; }
.header h1 { font-size: 24px; font-weight: 760; }
.header .meta { color: rgba(255,255,255,.78); font-size: 13px; margin-top: 4px; }
.header a { color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,.4); padding: 8px 12px; border-radius: 6px; font-size: 13px; }
.toolbar { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; align-items: end; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
select, input { height: 36px; border: 1px solid var(--border); border-radius: 6px; background: #fff; padding: 0 10px; font-size: 13px; color: var(--text); }
input[type="search"] { min-width: 280px; flex: 1; }
button { height: 36px; border: 0; border-radius: 6px; background: var(--primary); color: #fff; padding: 0 16px; font-weight: 700; cursor: pointer; }
button:disabled { opacity: .55; cursor: wait; }
.status { font-size: 13px; color: var(--muted); padding-bottom: 9px; }
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
.kpi { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.kpi .label { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.kpi .value { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
.kpi .delta { margin-top: 5px; font-size: 12px; color: var(--muted); }
.delta.up { color: var(--ok); }
.delta.down { color: var(--bad); }
.panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.panel-head { padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); gap: 12px; }
.panel-head h2 { font-size: 15px; }
.count { font-size: 12px; color: var(--muted); background: #eef3f8; border-radius: 999px; padding: 4px 10px; white-space: nowrap; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 1250px; }
th, td { padding: 10px 12px; border-bottom: 1px solid #edf2f7; font-size: 13px; text-align: left; vertical-align: top; }
th { background: #f8fafc; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
tr:hover td { background: #f8fafc; }
.rank { width: 54px; color: var(--muted); font-weight: 800; }
.title { font-weight: 750; max-width: 430px; }
.url { color: var(--accent); text-decoration: none; word-break: break-all; }
.type { display: inline-block; border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 700; background: #eef3f8; color: var(--muted); }
.number { font-weight: 750; text-align: right; white-space: nowrap; }
.muted { color: var(--muted); }
.empty { padding: 40px; text-align: center; color: var(--muted); }
@media (max-width: 980px) {
  .container { padding: 12px; }
  .header { align-items: flex-start; flex-direction: column; }
  input[type="search"] { min-width: 100%; }
}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div>
      <h1>链接访问量统计</h1>
      <div class="meta" id="meta">US 店铺 · Shopify Analytics landing page report</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <a href="/shopify.html">Shopify 库存</a>
      <a href="/inventory-age.html">库龄分析</a>
      <a href="/">返回独立站库存看板</a>
    </div>
  </header>

  <section class="toolbar">
    <div class="field">
      <label for="storeSelect">店铺</label>
      <select id="storeSelect">
        <option value="SHOPIFY_US_STORE">US - store.sunlu.com</option>
      </select>
    </div>
    <div class="field">
      <label for="sinceInput">当前开始</label>
      <input id="sinceInput" type="date">
    </div>
    <div class="field">
      <label for="untilInput">当前结束</label>
      <input id="untilInput" type="date">
    </div>
    <div class="field">
      <label for="compareSinceInput">对比开始</label>
      <input id="compareSinceInput" type="date">
    </div>
    <div class="field">
      <label for="compareUntilInput">对比结束</label>
      <input id="compareUntilInput" type="date">
    </div>
    <div class="field">
      <label for="limitSelect">数量</label>
      <select id="limitSelect">
        <option value="10">Top 10</option>
        <option value="20">Top 20</option>
        <option value="50">Top 50</option>
        <option value="100">Top 100</option>
      </select>
    </div>
    <input id="searchInput" type="search" placeholder="搜索标题、链接、类型">
    <button id="loadBtn">加载数据</button>
    <span class="status" id="statusText">准备就绪</span>
  </section>

  <section class="kpis" id="kpiGrid"></section>

  <section class="panel">
    <div class="panel-head">
      <h2>链接访问量排行</h2>
      <span class="count" id="tableCount">0 条</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="rank">排名</th>
            <th>标题</th>
            <th>链接</th>
            <th>类型</th>
            <th class="number">访客</th>
            <th class="number">Sessions</th>
            <th class="number">Sessions 环比</th>
            <th class="number">加购</th>
            <th class="number">结账</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </section>
</div>

<script src="/shopify-links.js"></script>
</body>
</html>
