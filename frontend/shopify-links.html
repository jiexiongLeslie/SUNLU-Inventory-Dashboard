<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNLU 链接流量分析</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/layout.css">
<style>
:root {
  --bg: #eef7ff;
  --card: #fff;
  --muted: #eaf4ff;
  --hover: #e6f2ff;
  --br: #cfe1ff;
  --br2: #a8c7ff;
  --t1: #111827;
  --t2: #4b5563;
  --t3: #9ca3af;
  --ac: #0f6bff;
  --ac-bg: #e4efff;
  --ac-t: #0747b6;
  --gn: #00a66a;
  --gn-bg: #e5fff5;
  --rd: #ef4444;
  --rd-bg: #fef2f2;
  --am: #f59e0b;
  --am-bg: #fff7dd;
  --grid: rgba(0,0,0,.06);
  --sh: 0 10px 24px rgba(37,99,235,.09), 0 1px 2px rgba(15,23,42,.05);
  --r: 10px;
  --r-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: radial-gradient(circle at 8% 0%, rgba(45,212,191,.18), transparent 28%), var(--bg); color: var(--t1); font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; font-size: 13px; line-height: 1.5; }
button, input, select { font-family: inherit; }
button { cursor: pointer; border: 0; background: none; }
.page { max-width: 1760px; margin: 0 auto; padding: 14px 18px 24px; }
.topbar { min-height: 54px; background: linear-gradient(135deg, #fff 0%, #f0f8ff 100%); border: 1px solid var(--br); border-radius: var(--r); display: flex; align-items: center; flex-wrap: wrap; padding: 10px 14px; gap: 8px; box-shadow: var(--sh); margin-bottom: 12px; }
.topbar h1 { font-size: 14px; font-weight: 700; white-space: nowrap; margin-right: 4px; }
.sep { width: 1px; height: 22px; background: var(--br); }
.date-box { display: flex; align-items: center; gap: 6px; padding: 5px 9px; border-radius: var(--r-sm); border: 1px solid var(--br2); background: var(--muted); color: var(--t2); font-size: 11px; white-space: nowrap; }
.date-box input, .date-box select { height: 25px; border: 1px solid var(--br); border-radius: 4px; padding: 0 6px; font-size: 11px; color: var(--t1); background: var(--card); }
.date-box.compare { display: none; border-color: #facc15; background: #fffbe8; }
.compare-toggle { padding: 5px 10px; font-size: 11px; border-radius: var(--r-sm); border: 1px solid #facc15; color: #a16207; background: #fffbe8; transition: all .12s; white-space: nowrap; }
.compare-toggle.on { background: #facc15; border-color: #eab308; color: #713f12; font-weight: 800; }
.preset, .store-tab { padding: 5px 10px; font-size: 11px; border-radius: var(--r-sm); border: 1px solid var(--br); background: transparent; color: var(--t2); transition: all .12s; white-space: nowrap; }
.preset:hover, .store-tab:hover { border-color: var(--ac); color: var(--ac); }
.store-tab.on { background: var(--ac-bg); border-color: var(--ac); color: var(--ac-t); font-weight: 700; }
.search-inp { height: 31px; min-width: 240px; padding: 4px 10px; font-size: 11px; border: 1px solid var(--br); border-radius: var(--r-sm); background: var(--muted); color: var(--t1); outline: none; }
.search-inp:focus { border-color: var(--ac); }
.action { padding: 6px 14px; border-radius: var(--r-sm); background: var(--ac); color: #fff; font-size: 12px; font-weight: 700; margin-left: auto; }
.action.secondary { margin-left: 0; background: var(--muted); color: var(--ac-t); border: 1px solid var(--br2); }
.action:disabled { opacity: .55; cursor: wait; }
.status { color: var(--t3); font-size: 11px; min-width: 170px; }
.store-tabs { display: flex; gap: 3px; flex-wrap: wrap; }
.krow { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 12px; }
.kpi { background: var(--card); border: 1px solid var(--br); border-radius: var(--r); padding: 12px 14px; box-shadow: var(--sh); min-height: 92px; }
.kpi.hi { border-color: var(--ac); background: var(--ac-bg); }
.kl { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.kv { font-size: 20px; font-weight: 800; line-height: 1.05; letter-spacing: 0; }
.kft { margin-top: 7px; font-size: 10px; color: var(--t3); display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.kcmp { margin-top: 5px; font-size: 10px; color: var(--t2); display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
.kpi .kcmp { justify-content: flex-start; }
.delta { display: inline-flex; align-items: center; padding: 1px 5px; border-radius: 999px; font-size: 9px; font-weight: 800; }
.delta.up { color: var(--gn); background: var(--gn-bg); }
.delta.down { color: var(--rd); background: var(--rd-bg); }
.delta.flat { color: var(--t3); background: var(--muted); }
.row { display: grid; gap: 12px; margin-bottom: 12px; }
.c1 { grid-template-columns: 1fr; }
.c2 { grid-template-columns: 1fr 1fr; }
.card { background: var(--card); border: 1px solid var(--br); border-radius: var(--r); padding: 14px 16px; box-shadow: var(--sh); }
.ch { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.ct { font-size: 11px; font-weight: 800; color: var(--t2); text-transform: uppercase; letter-spacing: .07em; white-space: nowrap; }
.bdg { font-size: 10px; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--br); background: var(--muted); color: var(--t3); white-space: nowrap; }
.bdg.ac { background: var(--ac-bg); border-color: var(--ac); color: var(--ac-t); }
.ml { margin-left: auto; }
.note { font-size: 10px; color: var(--t3); margin-bottom: 8px; line-height: 1.6; }
.cw { position: relative; width: 100%; }
.h220 { height: 220px; }
.h240 { height: 240px; }
.h260 { height: 260px; }
.leg-row { display: flex; flex-wrap: wrap; gap: 10px; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--t2); }
.ld { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.funnel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; padding-top: 4px; }
.fn-store { margin-bottom: 2px; }
.fn-title { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; color: var(--t1); margin-bottom: 8px; }
.fn-stages { display: flex; flex-direction: column; gap: 5px; }
.fn-row { display: flex; align-items: center; gap: 9px; }
.fn-lbl { width: 76px; font-size: 9px; color: var(--t3); text-align: right; flex-shrink: 0; }
.fn-bg { flex: 1; height: 20px; background: var(--muted); border-radius: 5px; overflow: hidden; position: relative; border: 1px solid var(--br); }
.fn-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
.fn-num { position: absolute; right: 7px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 800; }
.fn-pct { width: 50px; font-size: 10px; text-align: right; color: var(--t2); flex-shrink: 0; font-weight: 700; }
.table-wrap { overflow-x: auto; }
table.dt { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 980px; }
.dt th { padding: 7px 9px; font-size: 9px; font-weight: 800; color: var(--t3); text-transform: uppercase; letter-spacing: .07em; border-bottom: 2px solid var(--br); text-align: left; white-space: nowrap; cursor: pointer; user-select: none; }
.dt th.r, .dt td.r { text-align: right; }
.dt th:hover { color: var(--ac); }
.dt td { padding: 7px 9px; border-bottom: 1px solid var(--muted); color: var(--t1); vertical-align: middle; white-space: nowrap; }
.dt tbody tr:hover td { background: var(--hover); }
.link-title { font-weight: 700; max-width: 320px; white-space: normal; line-height: 1.35; }
.url { color: var(--ac); text-decoration: none; word-break: break-all; white-space: normal; line-height: 1.35; }
.wrap-cell { max-width: 240px; white-space: normal !important; line-height: 1.35; color: var(--t2); }
.pt { display: inline-flex; align-items: center; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
.pt-prod { background: #dbeafe; color: #1e40af; }
.pt-coll { background: #d1fae5; color: #065f46; }
.pt-pg { background: #fef3c7; color: #92400e; }
.pt-home { background: #ede9fe; color: #5b21b6; }
.pt-blog { background: #fee2e2; color: #991b1b; }
.pt-cart { background: #fce7f3; color: #9d174d; }
.pt-oth { background: #f3f4f6; color: #374151; }
.pager { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding-top: 10px; font-size: 11px; color: var(--t2); }
.pager button { min-width: 28px; height: 26px; padding: 0 7px; border: 1px solid var(--br); border-radius: 4px; color: var(--t2); }
.pager button:disabled { opacity: .35; cursor: default; }
.pager select { height: 26px; border: 1px solid var(--br); border-radius: 4px; background: var(--card); color: var(--t2); font-size: 11px; }
.empty { padding: 36px; text-align: center; color: var(--t3); }
@media (max-width: 1100px) {
  .krow { grid-template-columns: repeat(2, 1fr); }
  .c2 { grid-template-columns: 1fr; }
  .action { margin-left: 0; }
}
@media (max-width: 720px) {
  .page { padding: 10px; }
  .krow { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main class="page">
  <section class="topbar">
    <h1>链接流量分析</h1>
    <div class="sep"></div>
    <div class="date-box">
      主时段
      <input id="sinceInput" type="date">
      <span>至</span>
      <input id="untilInput" type="date">
    </div>
    <button class="preset" data-preset="month">本月</button>
    <button class="preset" data-preset="30">近30天</button>
    <button class="preset" data-preset="7">近7天</button>
    <button class="compare-toggle" id="compareToggle">添加对比时段</button>
    <div class="date-box compare" id="compareBox">
      对比时段
      <input id="compareSinceInput" type="date">
      <span>至</span>
      <input id="compareUntilInput" type="date">
    </div>
    <div class="sep"></div>
    <div class="store-tabs" id="storeTabs"></div>
    <div class="date-box">
      渠道
      <select id="channelSelect"><option value="">全部渠道</option></select>
    </div>
    <input id="searchInput" class="search-inp" type="search" placeholder="搜索链接、标题、类型">
    <button class="action" id="loadBtn">加载数据</button>
    <button class="action secondary" id="refreshBtn">刷新缓存</button>
    <span class="status" id="statusText">准备就绪</span>
  </section>

  <section class="krow" id="kpiGrid"></section>

  <section class="row c1">
    <div class="card">
      <div class="ch">
        <span class="ct">转化漏斗</span>
        <span class="bdg ac ml" id="funnelRange"></span>
      </div>
      <div class="funnel-grid" id="funnelGrid"></div>
    </div>
  </section>

  <section class="row c2">
    <div class="card">
      <div class="ch">
        <span class="ct">渠道 Sessions vs CVR</span>
        <span class="bdg ml" id="channelChartLabel"></span>
        <span class="bdg ac">响应日期 + 店铺 + 渠道筛选</span>
      </div>
      <p class="note">柱：Sessions | 折线：结账转化率 | 体量大且转化高的渠道优先关注</p>
      <div class="cw h240"><canvas id="channelChart"></canvas></div>
    </div>
    <div class="card">
      <div class="ch">
        <span class="ct">流量类型占比</span>
        <span class="bdg ml" id="trafficChartLabel"></span>
      </div>
      <div class="cw h260"><canvas id="trafficChart"></canvas></div>
    </div>
  </section>

  <section class="row c1">
    <div class="card">
      <div class="ch">
        <span class="ct">各链接页面流量明细</span>
        <span class="bdg ml" id="tableLabel"></span>
        <span class="bdg">响应日期 + 店铺 + 渠道筛选</span>
      </div>
      <div class="table-wrap"><table class="dt" id="pageTable"></table></div>
      <div class="pager">
        <button id="prevPageBtn">&lt;</button>
        <span id="pageText">第 1 / 1 页</span>
        <button id="nextPageBtn">&gt;</button>
        <span>每页</span>
        <select id="pageSizeSelect">
          <option value="8" selected>8</option>
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>
    </div>
  </section>

  <section class="row c2">
    <div class="card">
      <div class="ch">
        <span class="ct">落地页类型 Sessions & CVR</span>
        <span class="bdg ml" id="landingChartLabel"></span>
      </div>
      <div class="cw h240"><canvas id="landingChart"></canvas></div>
    </div>
    <div class="card">
      <div class="ch">
        <span class="ct">每日 Sessions 趋势</span>
        <div class="leg-row ml" id="dailyLegend"></div>
      </div>
      <div class="cw h240"><canvas id="dailyChart"></canvas></div>
    </div>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="/shopify-links.js"></script>
<script src="/layout.js"></script>
</body>
</html>
