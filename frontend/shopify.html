<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNLU Shopify 库存统计</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/layout.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #16325c;
  --accent: #2f80ed;
  --bg: #f4f7fb;
  --card: #fff;
  --text: #172033;
  --muted: #6b7280;
  --border: #dfe7f1;
  --ok: #218a54;
  --warn: #b7791f;
  --bad: #c53030;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; background: var(--bg); color: var(--text); }
.container { max-width: 1440px; margin: 0 auto; padding: 24px; }
.header { background: var(--primary); color: #fff; padding: 24px 28px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; gap: 18px; margin-bottom: 18px; }
.header h1 { font-size: 24px; font-weight: 750; }
.header .meta { color: rgba(255,255,255,.78); font-size: 13px; margin-top: 4px; }
.header a { color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,.4); padding: 8px 12px; border-radius: 6px; font-size: 13px; }
.toolbar { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
select, input { height: 36px; border: 1px solid var(--border); border-radius: 6px; background: #fff; padding: 0 10px; font-size: 13px; color: var(--text); }
input { min-width: 260px; flex: 1; }
button { height: 36px; border: 0; border-radius: 6px; background: var(--primary); color: #fff; padding: 0 14px; font-weight: 650; cursor: pointer; }
button:disabled { opacity: .55; cursor: wait; }
.status { font-size: 13px; color: var(--muted); }
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
.kpi { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.kpi .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.kpi .value { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
.tabs { display: flex; border-bottom: 2px solid var(--border); margin-top: 6px; }
.tab { height: 40px; border: 0; border-radius: 0; background: transparent; color: var(--muted); padding: 0 20px; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); background: transparent; }
.panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.tabs + .panel { border-radius: 0 8px 8px 8px; border-top: 0; }
.panel-head { padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.panel-head h2 { font-size: 15px; }
.summary-tools { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); background: #fbfdff; }
.summary-search { max-width: 460px; min-width: 280px; flex: 1; }
.summary-hint { font-size: 12px; color: var(--muted); white-space: nowrap; }
.count { font-size: 12px; color: var(--muted); background: #eef3f8; border-radius: 999px; padding: 4px 10px; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 1100px; }
th, td { padding: 10px 12px; border-bottom: 1px solid #edf2f7; font-size: 13px; text-align: left; vertical-align: top; }
th { background: #f8fafc; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
tr:hover td { background: #f8fafc; }
.sku { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; }
.muted { color: var(--muted); }
.badge { display: inline-block; border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
.badge.ok { background: #e9f8ef; color: var(--ok); }
.badge.warn { background: #fff7e6; color: var(--warn); }
.badge.bad { background: #fff0f0; color: var(--bad); }
.number { font-weight: 750; text-align: right; }
.empty { padding: 36px; text-align: center; color: var(--muted); }
.summary-name { font-weight: 700; max-width: 360px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-cell { display: flex; align-items: center; gap: 8px; }
.rank-badge { width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; background: #eef3f8; color: var(--muted); }
.rank-badge.top1 { background: linear-gradient(135deg, #fef3c7, #fcd34d); color: #92400e; }
.rank-badge.top2 { background: linear-gradient(135deg, #e2e8f0, #cbd5e0); color: #4a5568; }
.rank-badge.top3 { background: linear-gradient(135deg, #fed7aa, #fbd38d); color: #9c4221; }
.bar-cell { min-width: 130px; }
.bar-cell .bar { height: 6px; background: #edf2f7; border-radius: 999px; overflow: hidden; }
.bar-cell .fill { height: 100%; background: var(--primary); border-radius: 999px; }
.expand-btn { cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.expand-btn:hover { color: var(--accent); }
.arrow { display: inline-block; transition: transform .15s ease; color: var(--muted); }
.arrow.open { transform: rotate(90deg); }
.detail-row { display: none; }
.detail-row.show { display: table-row; }
.detail-cell { padding: 0; background: #f8fafc; }
.detail-inner { margin: 0 12px 12px 34px; border-left: 3px solid var(--accent); background: #fff; border-radius: 0 8px 8px 0; overflow: hidden; }
.detail-inner table { min-width: 860px; }
@media (max-width: 980px) {
  .container { padding: 12px; }
  .header { align-items: flex-start; flex-direction: column; }
  .kpis { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div>
      <h1>Shopify 库存统计</h1>
      <div class="meta" id="meta">按独立站产品汇总口径统计 Shopify SKU 库存</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <a href="/shopify-links.html">链接访问量</a>
      <a href="/inventory-age.html">库龄分析</a>
      <a href="/sku-mapping.html">SKU 映射</a>
      <a href="/quality.html">数据诊断</a>
      <a href="/">返回独立站库存看板</a>
    </div>
  </header>

  <section class="toolbar">
    <select id="storeSelect">
      <option value="">全部店铺</option>
    </select>
    <select id="riskSelect">
      <option value="">全部库存状态</option>
      <option value="out_of_stock">零库存</option>
      <option value="low">低库存</option>
      <option value="healthy">库存正常</option>
    </select>
    <input id="searchInput" type="search" placeholder="搜索产品分类、SKU、颜色、Shopify产品">
    <button id="refreshBtn">刷新 Shopify 并更新缓存</button>
    <span class="status" id="statusText">准备就绪</span>
  </section>

  <section class="kpis" id="kpiGrid"></section>

  <div class="tabs">
    <button class="tab active" data-view="summary">产品汇总</button>
    <button class="tab" data-view="detail">SKU 明细</button>
  </div>

  <section class="panel" id="summaryPanel">
    <div class="panel-head">
      <h2>产品级库存汇总</h2>
      <span class="count" id="summaryCount">0 个产品</span>
    </div>
    <div class="summary-tools">
      <input id="summarySearchInput" class="summary-search" type="search" placeholder="在产品汇总中搜索产品、SKU、颜色、店铺">
      <span class="summary-hint" id="summarySearchHint">按当前店铺口径过滤</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:70px">排名</th>
            <th>产品名称</th>
            <th>SKU 数</th>
            <th>颜色数</th>
            <th>总库存</th>
            <th>占比</th>
            <th>库存条</th>
            <th>去重/冲突</th>
          </tr>
        </thead>
        <tbody id="summaryBody"></tbody>
      </table>
    </div>
  </section>

  <section class="panel" id="detailPanel" style="display:none">
    <div class="panel-head">
      <h2>产品变体库存明细</h2>
      <span class="count" id="tableCount">0 条</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>产品分类</th>
            <th>颜色</th>
            <th>SKU</th>
            <th>库存</th>
            <th>状态</th>
            <th>店铺</th>
            <th>Shopify产品</th>
            <th>Vendor</th>
            <th>来源</th>
            <th>跟踪</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </section>
</div>

<script src="/shopify.js"></script>
<script src="/layout.js"></script>
</body>
</html>
