<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNLU 每日访问销量监控</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/layout.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #16325c;
  --accent: #2f80ed;
  --bg: #f4f7fb;
  --card: #fff;
  --text: #172033;
  --muted: #6b7280;
  --border: #dfe7f1;
  --ok: #218a54;
  --warn: #b7791f;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; background: var(--bg); color: var(--text); }
.container { max-width: 1760px; margin: 0 auto; padding: 24px; }
.header { background: linear-gradient(135deg, #16325c, #1f4f91); color: #fff; padding: 24px 28px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; gap: 18px; margin-bottom: 18px; }
.header h1 { font-size: 24px; font-weight: 780; }
.header .meta { color: rgba(255,255,255,.78); font-size: 13px; margin-top: 4px; }
.toolbar { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; align-items: end; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
select, input { height: 36px; border: 1px solid var(--border); border-radius: 6px; background: #fff; padding: 0 10px; font-size: 13px; color: var(--text); }
input[type="search"] { min-width: 260px; flex: 1; }
button { height: 36px; border: 0; border-radius: 6px; background: var(--primary); color: #fff; padding: 0 16px; font-weight: 700; cursor: pointer; }
button.secondary { background: #eef3f8; color: var(--primary); border: 1px solid var(--border); }
button:disabled { opacity: .55; cursor: wait; }
.status { font-size: 13px; color: var(--muted); padding-bottom: 9px; }
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 16px; }
.kpi { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.kpi .label { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.kpi .value { font-size: 26px; font-weight: 800; letter-spacing: 0; }
.kpi .sub { margin-top: 5px; font-size: 12px; color: var(--muted); }
.charts { display: grid; grid-template-columns: 1.45fr 1fr; gap: 14px; margin-bottom: 16px; }
.chart-card, .panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.chart-card { min-height: 330px; }
.chart-head, .panel-head { padding: 13px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); gap: 10px; }
.chart-head h2, .panel-head h2 { font-size: 15px; }
.chart-head span, .count { color: var(--muted); font-size: 12px; }
.chart-body { height: 290px; padding: 14px 16px; }
.count { background: #eef3f8; border-radius: 999px; padding: 4px 10px; white-space: nowrap; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
th, td { padding: 10px 12px; border-bottom: 1px solid #edf2f7; font-size: 13px; text-align: left; vertical-align: top; }
th { background: #f8fafc; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
tr:hover td { background: #f8fafc; }
.number { font-weight: 750; text-align: right; white-space: nowrap; }
.badge { display: inline-block; border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 700; background: #eef3f8; color: var(--muted); }
.empty { padding: 36px; text-align: center; color: var(--muted); }
.pager { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
.pager button { width: 34px; padding: 0; }
.pager span { color: var(--muted); font-size: 12px; min-width: 120px; text-align: center; }
@media (max-width: 980px) {
  .container { padding: 12px; }
  .header { align-items: flex-start; flex-direction: column; }
  .charts { grid-template-columns: 1fr; }
  input[type="search"] { min-width: 100%; }
}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div>
      <h1>每日访问访客数 + 销量监控</h1>
      <div class="meta" id="meta">5 站点 · sales + sessions · total_sales / orders / visitors / sessions</div>
    </div>
  </header>

  <section class="toolbar">
    <div class="field">
      <label for="storeSelect">店铺</label>
      <select id="storeSelect">
        <option value="ALL">全部站点</option>
        <option value="SHOPIFY_US_STORE">US - store.sunlu.com</option>
        <option value="SHOPIFY_UK_STORE">UK - uk.store.sunlu.com</option>
        <option value="SHOPIFY_FR_STORE">FR - fr.store.sunlu.com</option>
        <option value="SHOPIFY_DE_STORE">DE - de.store.sunlu.com</option>
        <option value="SHOPIFY_IT_STORE">IT - it.store.sunlu.com</option>
      </select>
    </div>
    <div class="field">
      <label for="sinceInput">开始</label>
      <input id="sinceInput" type="date">
    </div>
    <div class="field">
      <label for="untilInput">结束</label>
      <input id="untilInput" type="date">
    </div>
    <input id="searchInput" type="search" placeholder="搜索日期、店铺名">
    <button id="loadBtn">加载数据</button>
    <button id="refreshBtn" class="secondary">刷新并更新缓存</button>
    <span class="status" id="statusText">准备就绪</span>
  </section>

  <section class="kpis" id="kpiGrid"></section>

  <section class="charts">
    <div class="chart-card">
      <div class="chart-head"><h2>每日访问与销售趋势</h2><span>total_sales / orders / visitors / sessions</span></div>
      <div class="chart-body"><canvas id="dailyChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-head"><h2>店铺销售额占比</h2><span>按 total_sales</span></div>
      <div class="chart-body"><canvas id="storeChart"></canvas></div>
    </div>
  </section>

  <section class="panel" style="margin-bottom:16px">
    <div class="panel-head">
      <h2>店铺汇总</h2>
      <span class="count" id="storeCount">0 个站点</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>店铺</th>
            <th class="number">销售额</th>
            <th class="number">订单</th>
            <th class="number">访客</th>
            <th class="number">Sessions</th>
            <th class="number">订单转化率</th>
            <th class="number">客单价</th>
          </tr>
        </thead>
        <tbody id="storeBody"></tbody>
      </table>
    </div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h2>每日店铺明细</h2>
      <span class="count" id="rowCount">0 条</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>店铺</th>
            <th>Shop Name</th>
            <th class="number">销售额 USD</th>
            <th class="number">订单</th>
            <th class="number">访客</th>
            <th class="number">Sessions</th>
            <th class="number">订单转化率</th>
            <th class="number">客单价</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="pager">
      <button id="prevPageBtn" class="secondary" title="上一页">&lt;</button>
      <span id="pageText">第 1 / 1 页</span>
      <button id="nextPageBtn" class="secondary" title="下一页">&gt;</button>
    </div>
  </section>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="/daily-traffic-sales.js"></script>
<script src="/layout.js"></script>
</body>
</html>
