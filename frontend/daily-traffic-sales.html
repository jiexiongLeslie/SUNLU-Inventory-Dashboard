<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNLU 访客与销量监控</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/layout.css">
<style>
:root {
  --bg: #eef7ff;
  --card: #fff;
  --muted: #eaf4ff;
  --hover: #e6f2ff;
  --br: #cfe1ff;
  --br2: #a8c7ff;
  --t1: #111827;
  --t2: #4b5563;
  --t3: #9ca3af;
  --ac: #0f6bff;
  --ac-bg: #e4efff;
  --ac-t: #0747b6;
  --gn: #00a66a;
  --gn-bg: #e5fff5;
  --rd: #ef4444;
  --rd-bg: #fef2f2;
  --am: #f59e0b;
  --am-bg: #fff7dd;
  --grid: rgba(0,0,0,.06);
  --tick: #b0b8cc;
  --sh: 0 10px 24px rgba(37,99,235,.09), 0 1px 2px rgba(15,23,42,.05);
  --r: 10px;
  --r-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: radial-gradient(circle at 8% 0%, rgba(45,212,191,.18), transparent 28%), var(--bg); color: var(--t1); font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; font-size: 13px; line-height: 1.5; }
button, input, select { font-family: inherit; }
button { cursor: pointer; border: 0; background: none; }
.page { max-width: 1760px; margin: 0 auto; padding: 14px 18px 24px; }
.topbar { min-height: 54px; background: linear-gradient(135deg, #fff 0%, #f0f8ff 100%); border: 1px solid var(--br); border-radius: var(--r); display: flex; align-items: center; flex-wrap: wrap; padding: 10px 14px; gap: 8px; box-shadow: var(--sh); margin-bottom: 12px; }
.topbar h1 { font-size: 14px; font-weight: 700; white-space: nowrap; margin-right: 4px; }
.sep { width: 1px; height: 22px; background: var(--br); }
.date-box { display: flex; align-items: center; gap: 6px; padding: 5px 9px; border-radius: var(--r-sm); border: 1px solid var(--br2); background: var(--muted); color: var(--t2); font-size: 11px; white-space: nowrap; }
.date-box.compare { border-color: var(--am); background: var(--am-bg); color: var(--am); }
.date-box input { height: 25px; border: 1px solid var(--br); border-radius: 4px; padding: 0 6px; font-size: 11px; color: var(--t1); background: var(--card); }
.preset, .store-tab, .metric-tab { padding: 5px 10px; font-size: 11px; border-radius: var(--r-sm); border: 1px solid var(--br); background: transparent; color: var(--t2); transition: all .12s; white-space: nowrap; }
.preset:hover, .store-tab:hover, .metric-tab:hover { border-color: var(--ac); color: var(--ac); }
.store-tab.on, .metric-tab.on { background: var(--ac-bg); border-color: var(--ac); color: var(--ac-t); font-weight: 700; }
.compare-toggle { border-style: dashed; }
.compare-toggle.on { background: var(--am-bg); border-color: var(--am); color: var(--am); font-weight: 700; }
.action { padding: 6px 14px; border-radius: var(--r-sm); background: var(--ac); color: #fff; font-size: 12px; font-weight: 700; margin-left: auto; }
.action.secondary { margin-left: 0; background: var(--muted); color: var(--ac-t); border: 1px solid var(--br2); }
.action:disabled { opacity: .55; cursor: wait; }
.status { color: var(--t3); font-size: 11px; min-width: 180px; }
.store-tabs { display: flex; gap: 3px; flex-wrap: wrap; }
.krow { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 12px; }
.kpi { background: var(--card); border: 1px solid var(--br); border-radius: var(--r); padding: 12px 14px; box-shadow: var(--sh); min-height: 92px; }
.kpi.hi { border-color: var(--ac); background: var(--ac-bg); }
.kl { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.kv { font-size: 20px; font-weight: 800; line-height: 1.05; letter-spacing: 0; }
.kft { margin-top: 7px; font-size: 10px; color: var(--t3); display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.kcmp { font-size: 10px; color: var(--am); margin-top: 5px; }
.delta { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 800; padding: 1px 6px; border-radius: 4px; margin-left: 4px; }
.delta.up { background: var(--gn-bg); color: var(--gn); }
.delta.down { background: var(--rd-bg); color: var(--rd); }
.delta.flat { background: var(--muted); color: var(--t3); }
.row { display: grid; gap: 12px; margin-bottom: 12px; }
.c1 { grid-template-columns: 1fr; }
.c21 { grid-template-columns: 2fr 1fr; }
.card { background: var(--card); border: 1px solid var(--br); border-radius: var(--r); padding: 14px 16px; box-shadow: var(--sh); }
.card.ac { border-color: var(--ac); }
.ch { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.ct { font-size: 11px; font-weight: 800; color: var(--t2); text-transform: uppercase; letter-spacing: .07em; white-space: nowrap; }
.bdg { font-size: 10px; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--br); background: var(--muted); color: var(--t3); white-space: nowrap; }
.bdg.ac { background: var(--ac-bg); border-color: var(--ac); color: var(--ac-t); }
.ml { margin-left: auto; }
.metric-tabs { display: flex; gap: 3px; margin-bottom: 8px; }
.cw { position: relative; width: 100%; }
.h170 { height: 170px; }
.h200 { height: 200px; }
.h220 { height: 220px; }
.leg-row { display: flex; flex-wrap: wrap; gap: 10px; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--t2); }
.ld { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.table-wrap { overflow-x: auto; }
table.dt { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 900px; }
.dt th { padding: 7px 9px; font-size: 9px; font-weight: 800; color: var(--t3); text-transform: uppercase; letter-spacing: .07em; border-bottom: 2px solid var(--br); text-align: left; white-space: nowrap; }
.dt th.r, .dt td.r { text-align: right; }
.dt td { padding: 7px 9px; border-bottom: 1px solid var(--muted); color: var(--t1); vertical-align: middle; white-space: nowrap; }
.dt tbody tr:hover td { background: var(--hover); }
.sw { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
.pill { display: inline-flex; align-items: center; font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: 800; }
.pg { background: var(--gn-bg); color: var(--gn); }
.pa { background: var(--am-bg); color: var(--am); }
.pr { background: var(--rd-bg); color: var(--rd); }
.pager { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding-top: 10px; font-size: 11px; color: var(--t2); }
.pager button { min-width: 28px; height: 26px; padding: 0 7px; border: 1px solid var(--br); border-radius: 4px; color: var(--t2); }
.pager button:disabled { opacity: .35; cursor: default; }
.empty { padding: 36px; text-align: center; color: var(--t3); }
@media (max-width: 1100px) {
  .krow { grid-template-columns: repeat(2, 1fr); }
  .c21 { grid-template-columns: 1fr; }
  .action { margin-left: 0; }
}
@media (max-width: 720px) {
  .page { padding: 10px; }
  .krow { grid-template-columns: 1fr; }
  .topbar { align-items: flex-start; }
}
</style>
</head>
<body>
<main class="page">
  <section class="topbar">
    <h1>访客与销量监控</h1>
    <div class="sep"></div>
    <div class="date-box">
      主时段
      <input id="sinceInput" type="date">
      <span>至</span>
      <input id="untilInput" type="date">
    </div>
    <button class="preset" data-preset="ytd">本年</button>
    <button class="preset" data-preset="month">本月</button>
    <button class="preset" data-preset="90">近90天</button>
    <button class="preset compare-toggle" id="compareToggle">添加对比时段</button>
    <div class="date-box compare" id="compareBox" style="display:none">
      对比
      <input id="compareSinceInput" type="date">
      <span>至</span>
      <input id="compareUntilInput" type="date">
    </div>
    <div class="sep"></div>
    <div class="store-tabs" id="storeTabs"></div>
    <button class="action" id="loadBtn">加载数据</button>
    <button class="action secondary" id="refreshBtn">刷新缓存</button>
    <span class="status" id="statusText">准备就绪</span>
  </section>

  <section class="krow" id="kpiGrid"></section>

  <section class="row c1">
    <div class="card ac">
      <div class="ch">
        <span class="ct">综合转化率 CVR 趋势</span>
        <span class="bdg ac">CVR = 订单 / Sessions</span>
        <div class="leg-row ml" id="cvrLegend"></div>
      </div>
      <div class="cw h170"><canvas id="cvrChart"></canvas></div>
    </div>
  </section>

  <div class="metric-tabs">
    <button class="metric-tab on" data-metric="total_sales">销售额</button>
    <button class="metric-tab" data-metric="orders">订单数</button>
    <button class="metric-tab" data-metric="online_store_visitors">独立访客</button>
    <button class="metric-tab" data-metric="sessions">会话数</button>
  </div>

  <section class="row c21">
    <div class="card">
      <div class="ch">
        <span class="ct" id="trendTitle">销售额趋势</span>
        <div class="leg-row ml" id="trendLegend"></div>
      </div>
      <div class="cw h200"><canvas id="metricChart"></canvas></div>
    </div>
    <div class="card">
      <div class="ch">
        <span class="ct">AOV 客单价对比</span>
        <span class="bdg ml" id="storeCount">5 站</span>
      </div>
      <div class="cw h220"><canvas id="aovChart"></canvas></div>
    </div>
  </section>

  <section class="row c1">
    <div class="card">
      <div class="ch">
        <span class="ct">各店铺运营汇总</span>
        <span class="bdg ac ml" id="rangeLabel"></span>
      </div>
      <div class="table-wrap"><table class="dt" id="storeTable"></table></div>
    </div>
  </section>

  <section class="row c1">
    <div class="card">
      <div class="ch">
        <span class="ct">每日店铺明细</span>
        <span class="bdg ml" id="rowCount">0 条</span>
      </div>
      <div class="table-wrap"><table class="dt" id="detailTable"></table></div>
      <div class="pager">
        <button id="prevPageBtn">&lt;</button>
        <span id="pageText">第 1 / 1 页</span>
        <button id="nextPageBtn">&gt;</button>
      </div>
    </div>
  </section>
</main>

<script src="/vendor/chart.umd.min.js"></script>
<script src="/daily-traffic-sales.js"></script>
<script src="/layout.js"></script>
</body>
</html>
